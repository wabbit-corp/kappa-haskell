name: CI and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub release tag to create or update"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: kappa-haskell-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Haskell compiler
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libgc-dev libgmp-dev pkg-config

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-cabal-${{ hashFiles('kappa-haskell.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-cabal-

      - name: Build
        run: |
          cabal update
          cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

  native-gates:
    name: Native backend and Delve gates
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libgc-dev libgmp-dev pkg-config sqlite3 libsqlite3-dev zlib1g-dev libuv1-dev curl

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-native-${{ hashFiles('kappa-haskell.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-native-

      - name: Run native gate suite
        shell: bash
        run: |
          set -euo pipefail
          cabal update
          export KAPPA_CC="cc $(pkg-config --cflags --libs bdw-gc gmp)"
          test/native/run-native-tests.sh

  package-compiler:
    name: Package Haskell compiler (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs:
      - test
      - native-gates
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-14
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-package-${{ hashFiles('kappa-haskell.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-package-

      - name: Build release executable
        shell: bash
        run: |
          set -euo pipefail

          cabal update
          out_dir="$PWD/dist/release/kappa-haskell-${{ matrix.platform }}"
          mkdir -p "$out_dir/bin"
          exe_ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            exe_ext=".exe"
          fi

          cabal install exe:kappa \
            --install-method=copy \
            --installdir="$out_dir/bin" \
            --overwrite-policy=always

          usage_output="$("$out_dir/bin/kappa${exe_ext}" 2>&1 || true)"
          grep -q '^usage: kappa' <<<"$usage_output"

          cp LICENSE "$out_dir/LICENSE"
          cp CHANGELOG.md "$out_dir/CHANGELOG.md"
          cp docs/Spec.md "$out_dir/Spec.md"
          cp TESTING.md "$out_dir/TESTING.md"
          cp SPEC_COVERAGE.md "$out_dir/SPEC_COVERAGE.md" || true

          mkdir -p "$PWD/dist/assets"
          tar -C "$PWD/dist/release" -czf "$PWD/dist/assets/kappa-haskell-${{ matrix.platform }}.tar.gz" "kappa-haskell-${{ matrix.platform }}"

      - name: Upload compiler package
        uses: actions/upload-artifact@v4
        with:
          name: kappa-haskell-${{ matrix.platform }}
          path: dist/assets/*
          if-no-files-found: error

  package-delve:
    name: Package Delve game (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs:
      - test
      - native-gates
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            test-target: delve-tests-linux
            game-target: delve-linux
            exe-ext: ""
          - os: macos-14
            platform: macos-arm64
            test-target: delve-tests-macos-arm64
            game-target: delve-macos-arm64
            exe-ext: ""
          - os: windows-latest
            platform: windows-x64
            test-target: delve-tests-windows-x64
            game-target: delve-windows-x64
            exe-ext: ".exe"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libgc-dev libgmp-dev pkg-config

      - name: Install native dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install bdw-gc gmp pkg-config

      - name: Install native dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: prepend
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gc
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-pkgconf

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.10.3.0"

      - name: Install Kappa compiler for Delve (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          cabal update
          compiler_dir="$PWD/dist/release/kappa-haskell-${{ matrix.platform }}"
          mkdir -p "$compiler_dir/bin"
          cabal install exe:kappa \
            --install-method=copy \
            --installdir="$compiler_dir/bin" \
            --overwrite-policy=always

      - name: Build compiler and Delve (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          cabal update

          compiler_dir="$PWD/dist/release/kappa-haskell-${{ matrix.platform }}"
          mkdir -p "$compiler_dir/bin"
          cabal install exe:kappa \
            --install-method=copy \
            --installdir="$compiler_dir/bin" \
            --overwrite-policy=always

          game_dir="$PWD/dist/release/delve-${{ matrix.platform }}"
          mkdir -p "$game_dir/bin"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            cc_cmd="cc $(pkg-config --cflags --libs bdw-gc gmp)"
          else
            cc_cmd="cc $(pkg-config --cflags --libs bdw-gc gmp)"
          fi
          export KAPPA_CC="$cc_cmd"

          "$compiler_dir/bin/kappa" build \
            --update \
            --manifest examples/packages/delve \
            --target "${{ matrix.test-target }}" \
            -o "$game_dir/bin/delve-tests${{ matrix.exe-ext }}" \
            --cc "$cc_cmd"

          cp -R examples/packages/delve/assets "$game_dir/assets"
          mkdir -p "$game_dir/saves"
          touch "$game_dir/saves/.gitkeep"
          test -f "$game_dir/assets/delve/pack.json"
          test -f "$game_dir/assets/delve/items.json"
          test -f "$game_dir/assets/delve/systems.json"

          test_output="$(cd "$game_dir" && "bin/delve-tests${{ matrix.exe-ext }}")"
          printf '%s\n' "$test_output"
          grep -q '^DELVE TESTS: ALL PASS$' <<<"$test_output"
          rm -rf "$game_dir/bin"
          rm -rf "$game_dir/saves"
          mkdir -p "$game_dir/saves"
          touch "$game_dir/saves/.gitkeep"

          "$compiler_dir/bin/kappa" build \
            --update \
            --manifest examples/packages/delve \
            --target "${{ matrix.game-target }}" \
            -o "$game_dir/delve${{ matrix.exe-ext }}" \
            --cc "$cc_cmd"

          cp LICENSE "$game_dir/LICENSE"
          cp examples/packages/delve/README.md "$game_dir/README.md"
          cp examples/packages/delve/DESIGN.md "$game_dir/DESIGN.md"

          mkdir -p "$PWD/dist/assets"
          tar -C "$PWD/dist/release" -czf "$PWD/dist/assets/delve-${{ matrix.platform }}.tar.gz" "delve-${{ matrix.platform }}"

      - name: Build compiler and Delve (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail

          compiler_dir="$PWD/dist/release/kappa-haskell-${{ matrix.platform }}"
          game_dir="$PWD/dist/release/delve-${{ matrix.platform }}"
          mkdir -p "$game_dir/bin"

          pkgconf_bin="$(command -v pkgconf || command -v pkg-config || true)"
          cc_bin="$(command -v gcc || command -v clang || true)"
          if [[ -z "$pkgconf_bin" || -z "$cc_bin" ]]; then
            printf 'Windows native tool lookup failed.\n' >&2
            printf 'pkgconf=%s\n' "$pkgconf_bin" >&2
            printf 'cc=%s\n' "$cc_bin" >&2
            printf 'PATH=%s\n' "$PATH" >&2
            exit 1
          fi
          "$pkgconf_bin" --exists bdw-gc gmp
          cc_cmd="$cc_bin $("$pkgconf_bin" --cflags --libs bdw-gc gmp)"
          export KAPPA_CC="$cc_cmd"

          chcp.com 65001 >/dev/null || true

          "$compiler_dir/bin/kappa.exe" build \
            --update \
            --manifest examples/packages/delve \
            --target "${{ matrix.test-target }}" \
            -o "$game_dir/bin/delve-tests${{ matrix.exe-ext }}" \
            --cc "$cc_cmd"

          cp -R examples/packages/delve/assets "$game_dir/assets"
          mkdir -p "$game_dir/saves"
          touch "$game_dir/saves/.gitkeep"
          test -f "$game_dir/assets/delve/pack.json"
          test -f "$game_dir/assets/delve/items.json"
          test -f "$game_dir/assets/delve/systems.json"

          test_output="$(cd "$game_dir" && "bin/delve-tests${{ matrix.exe-ext }}")"
          printf '%s\n' "$test_output"
          grep -q '^DELVE TESTS: ALL PASS$' <<<"$test_output"
          rm -rf "$game_dir/bin"
          rm -rf "$game_dir/saves"
          mkdir -p "$game_dir/saves"
          touch "$game_dir/saves/.gitkeep"

          "$compiler_dir/bin/kappa.exe" build \
            --update \
            --manifest examples/packages/delve \
            --target "${{ matrix.game-target }}" \
            -o "$game_dir/delve${{ matrix.exe-ext }}" \
            --cc "$cc_cmd"

          cp /mingw64/bin/libgc-1.dll "$game_dir/"
          cp /mingw64/bin/libgmp-10.dll "$game_dir/"
          cp LICENSE "$game_dir/LICENSE"
          cp examples/packages/delve/README.md "$game_dir/README.md"
          cp examples/packages/delve/DESIGN.md "$game_dir/DESIGN.md"

          mkdir -p "$PWD/dist/assets"
          tar -C "$PWD/dist/release" -czf "$PWD/dist/assets/delve-${{ matrix.platform }}.tar.gz" "delve-${{ matrix.platform }}"

      - name: Upload Delve package
        uses: actions/upload-artifact@v4
        with:
          name: delve-${{ matrix.platform }}
          path: dist/assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - package-compiler
      - package-delve
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          repo="${GITHUB_REPOSITORY}"

          if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --repo "$repo" --clobber
          else
            gh release create "$tag" release-assets/* \
              --repo "$repo" \
              --target "$GITHUB_SHA" \
              --title "Kappa Haskell compiler ${tag}" \
              --notes "Automated Haskell compiler and Delve release for ${tag}."
          fi
